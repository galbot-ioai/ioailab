[metadata]
name = remote_control_lite
version = 0.1.0
description = Standalone bindings for Galbot remote teleoperation arm
long_description = file: README.md
long_description_content_type = text/markdown
author = Galbot
license = Apache-2.0

[options]
package_dir =
    = src
packages = find:
zip_safe = False
include_package_data = True
install_requires =
    pybind11>=2.11

[options.packages.find]
where = src

[options.package_data]
remote_control_lite = libs/*.so
